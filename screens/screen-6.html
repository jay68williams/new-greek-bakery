<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>New Greek Bakery - Sandwiches &amp; Paninis</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Display:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #0D47A1;
      --gold: #C9A24E;
      --gold-dark: #A78338;
      --text: #111111;
      --text-light: #666666;
    }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #FFFFFF;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .screen {
      width: 1920px;
      height: 1080px;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--blue);
      padding: 28px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-logo {
      font-family: 'Noto Serif Display', Georgia, serif;
      font-size: 32px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.02em;
    }
    .header-category {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .header-page {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
    }

    /* Gold accent bar */
    .gold-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-dark));
      flex-shrink: 0;
    }

    /* Content */
    .content {
      flex: 1;
      padding: 48px 60px 40px;
      display: flex;
      flex-direction: column;
    }

    .section-title {
      font-family: 'Noto Serif Display', Georgia, serif;
      font-size: 50px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .section-sub {
      font-size: 15px;
      color: var(--text-light);
      margin-bottom: 36px;
      font-weight: 400;
    }

    /* Menu grid - 2 columns */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      gap: 0 80px;
      flex: 1;
    }
    .menu-col {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 14px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .menu-item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-family: 'Noto Serif Display', Georgia, serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .item-dots {
      flex: 1;
      border-bottom: 1px dotted rgba(0,0,0,0.12);
      margin: 0 16px;
      min-width: 40px;
      position: relative;
      top: -4px;
    }
    .item-price {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: var(--blue);
      white-space: nowrap;
    }

    .item-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-dark);
      background: rgba(201,162,78,0.1);
      border: 1px solid rgba(201,162,78,0.25);
      padding: 3px 10px;
      border-radius: 3px;
      margin-left: 12px;
      vertical-align: middle;
    }

    /* Footer */
    .footer {
      padding: 20px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    .footer-left {
      font-size: 13px;
      color: var(--text-light);
    }
    .footer-right {
      font-size: 13px;
      color: var(--text-light);
    }
    .footer-right strong {
      color: var(--gold-dark);
    }
  
    /* Deli photo grid */
    .deli-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px 30px; flex: 1; align-content: start; }
    .deli-card { display: flex; flex-direction: column; }
    .deli-card-img { width: 100%; height: 288px; object-fit: cover; object-position: center; border-radius: 12px; display: block; background: rgba(201,162,78,0.1); }
    .deli-card-info { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; margin-top: 14px; }
    .deli-card-name { font-family: 'Noto Serif Display', Georgia, serif; font-size: 26px; font-weight: 400; color: var(--text); letter-spacing: -0.01em; line-height: 1.15; }
    .deli-card-price { font-family: 'Inter', sans-serif; font-size: 23px; font-weight: 600; color: var(--blue); white-space: nowrap; }
    .deli-card-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold-dark); background: rgba(201,162,78,0.1); border: 1px solid rgba(201,162,78,0.25); padding: 3px 9px; border-radius: 3px; margin-left: 10px; vertical-align: middle; }
    /* Pinsa screen: larger, centred, two-tier price */
    .pinsa-grid { align-content: center; gap: 44px; }
    .pinsa-grid .deli-card-img { height: 430px; }
    .pinsa-grid .deli-card-info { flex-direction: column; align-items: flex-start; gap: 8px; margin-top: 18px; }
    .pinsa-grid .deli-card-name { font-size: 31px; }
    .pinsa-grid .deli-card-price { font-size: 24px; }
  </style>
</head>
<body>
  <div class="screen">
    <div class="header">
      <span class="header-logo">New Greek Bakery</span>
      <span class="header-category">Sandwiches &amp; Paninis</span>
      <span class="header-page">6 / 7</span>
    </div>
    <div class="gold-bar"></div>

    <div class="content">
      <h2 class="section-title">Sandwiches &amp; Paninis</h2>
      <p class="section-sub">More from the deli counter.</p>

      <div class="deli-grid">
        <div class="deli-card">
          <img class="deli-card-img" src="/images/menu/prosciutto-rocket-figs.jpg" alt="Prosciutto, Fig &amp; Rocket">
          <div class="deli-card-info">
            <span class="deli-card-name">Prosciutto, Fig &amp; Rocket</span>
            <span class="deli-card-price">&pound;8.50</span>
          </div>
        </div>
        <div class="deli-card">
          <img class="deli-card-img" src="/images/menu/prosciutto-rocket.jpg" alt="Prosciutto &amp; Rocket">
          <div class="deli-card-info">
            <span class="deli-card-name">Prosciutto &amp; Rocket</span>
            <span class="deli-card-price">&pound;7.90</span>
          </div>
        </div>
        <div class="deli-card">
          <img class="deli-card-img" src="/images/menu/greek-village-baguette.jpg" alt="Greek Village Baguette">
          <div class="deli-card-info">
            <span class="deli-card-name">Greek Village Baguette</span>
            <span class="deli-card-price">&pound;6.50</span>
          </div>
        </div>
        <div class="deli-card">
          <img class="deli-card-img" src="/images/menu/omelette-baguette.jpg" alt="Classic Omelette Baguette">
          <div class="deli-card-info">
            <span class="deli-card-name">Classic Omelette Baguette</span>
            <span class="deli-card-price">&pound;6.90</span>
          </div>
        </div>
        <div class="deli-card">
          <img class="deli-card-img" src="/images/menu/ham-cheese-bagel.jpg" alt="Ham &amp; Cheese Bagel">
          <div class="deli-card-info">
            <span class="deli-card-name">Ham &amp; Cheese Bagel</span>
            <span class="deli-card-price">&pound;6.00</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <span class="footer-left">8 Clayton Road, Jesmond, Newcastle &middot; NE2 4RP</span>
      <span class="footer-right"><strong>@newgreek.ncl</strong></span>
    </div>
  </div>
</body>
</html>
